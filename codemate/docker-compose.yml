# CodeMate 依赖服务编排
# 各服务按学习路线分阶段启用，详见各 profile
#
# 用法：
#   docker compose --profile rag up -d         # W5 起：仅 Milvus
#   docker compose --profile full up -d        # W7 起：Milvus + Redis + Langfuse 全栈
#
# 注意：本文件是占位骨架，W5 / W7 时再补全实际配置

services:
  # ============ W5 起：向量库 ============
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    profiles: ["rag", "full"]
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    profiles: ["rag", "full"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./data/milvus/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"

  milvus:
    image: milvusdb/milvus:v2.4.5
    profiles: ["rag", "full"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - ./data/milvus/data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio

  # ============ W7 起：缓存 ============
  redis:
    image: redis:7-alpine
    profiles: ["full"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  # ============ W7 起：观测平台 ============
  # Langfuse 完整部署有 db + web + worker 几个服务
  # 占位，W7 实际启用时补全配置
